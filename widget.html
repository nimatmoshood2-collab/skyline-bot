<!--
  HARPER — SKYLINE REALTY EMBEDDABLE CHAT WIDGET (with voice)
  =============================================================
  How to use:
  1. Deploy server.js somewhere (see README.md).
  2. Replace BACKEND_URL below with your deployed server's address.
  3. Paste this entire block just before </body> on the real website.

  Voice notes:
  - Mic input needs the page to be served over HTTPS (required by browsers
    for microphone access) — this works automatically once deployed on a
    real domain (Render, Netlify, etc. all give you HTTPS by default).
  - Voice replies use the browser's built-in text-to-speech, no extra setup.
  - Best supported in Chrome; mic button auto-hides if unsupported.
-->

<div id="harper-widget-root"></div>

<style>
  #harper-launcher {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    width: 60px; height: 60px; border-radius: 50%;
    background: #20231F; color: #C2A25A;
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-weight: 600; font-size: 20px;
    cursor: pointer; box-shadow: 0 8px 24px rgba(32,35,31,0.35);
    border: none;
  }
  #harper-panel {
    position: fixed; bottom: 96px; right: 24px; z-index: 9999;
    width: 350px; max-width: 90vw; height: 480px;
    background: #fff; border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 50px rgba(32,35,31,0.25);
    display: none; flex-direction: column;
    font-family: 'Segoe UI', sans-serif;
  }
  #harper-panel.open { display: flex; }
  #harper-header { background:#20231F; color:#F4F1EC; padding:14px 16px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  #harper-voice-toggle { cursor:pointer; font-size:13px; opacity:0.85; }
  #harper-start-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; gap:14px; }
  #harper-start-btn { background:#20231F; color:#F4F1EC; border:none; border-radius:20px; padding:10px 22px; font-weight:600; cursor:pointer; }
  #harper-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:8px; background:#F4F1EC; }
  .harper-msg { max-width:80%; padding:8px 12px; border-radius:12px; font-size:14px; line-height:1.4; }
  .harper-user { align-self:flex-end; background:#20231F; color:#fff; border-radius:12px 12px 2px 12px; }
  .harper-bot { align-self:flex-start; background:#EFE7D8; color:#20231F; border-radius:12px 12px 12px 2px; }
  #harper-input-row { display:flex; border-top:1px solid #eee; align-items:center; }
  #harper-mic { border:none; background:none; font-size:18px; padding:0 10px; cursor:pointer; }
  #harper-mic.listening { animation: harperPulse 1s infinite; }
  @keyframes harperPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #harper-input { flex:1; border:none; padding:12px; font-size:14px; outline:none; }
  #harper-send { border:none; background:#20231F; color:#fff; padding:0 16px; height:44px; cursor:pointer; }
</style>

<button id="harper-launcher" onclick="document.getElementById('harper-panel').classList.toggle('open')">💬</button>

<div id="harper-panel">
  <div id="harper-header">
    <span>Harper · Skyline Realty</span>
    <span id="harper-voice-toggle" onclick="harperToggleVoice()">🔊 Voice</span>
  </div>
  <div id="harper-start-screen">
    <div style="font-size:15px; font-weight:600;">Hi, I'm Harper 👋</div>
    <div style="font-size:13px; color:#666;">Talk or type to find your next home.</div>
    <button id="harper-start-btn" onclick="harperStart()">Start conversation</button>
  </div>
  <div id="harper-messages" style="display:none;"></div>
  <div id="harper-input-row" style="display:none;">
    <button id="harper-mic" onclick="harperToggleMic()">🎙️</button>
    <input id="harper-input" placeholder="Type or tap the mic…" />
    <button id="harper-send">Send</button>
  </div>
</div>

<script>
(function () {
  // 🔧 REPLACE THIS with your deployed backend URL (see README.md)
  const BACKEND_URL = "https://your-deployed-backend.example.com/api/chat";
  const GREETING = "Hi 👋 welcome to Skyline Realty — I'm Harper, here to help you find the right place. Are you looking to buy or rent?";

  let history = [];
  let leadInfo = { name: "", contact: "", need: "", budget: "" };
  let voiceOn = true;
  let listening = false;
  let recognition = null;

  const messagesEl = document.getElementById("harper-messages");
  const inputEl = document.getElementById("harper-input");
  const sendBtn = document.getElementById("harper-send");
  const micBtn = document.getElementById("harper-mic");

  // Set up speech recognition if supported
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = "en-US";
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      inputEl.value = transcript;
      listening = false;
      micBtn.classList.remove("listening");
      harperSend(transcript);
    };
    recognition.onerror = () => { listening = false; micBtn.classList.remove("listening"); };
    recognition.onend = () => { listening = false; micBtn.classList.remove("listening"); };
  } else {
    micBtn.style.display = "none";
  }

  window.harperToggleMic = function () {
    if (!recognition) return;
    if (listening) {
      recognition.stop();
    } else {
      try {
        recognition.start();
        listening = true;
        micBtn.classList.add("listening");
      } catch (e) {}
    }
  };

  window.harperToggleVoice = function () {
    voiceOn = !voiceOn;
    document.getElementById("harper-voice-toggle").textContent = voiceOn ? "🔊 Voice" : "🔇 Voice";
    if (!voiceOn && window.speechSynthesis) window.speechSynthesis.cancel();
  };

  function speak(text) {
    if (!voiceOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => v.lang === "en-US") || voices[0];
    if (preferred) utter.voice = preferred;
    setTimeout(() => window.speechSynthesis.speak(utter), 60);
  }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "harper-msg " + (role === "user" ? "harper-user" : "harper-bot");
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  window.harperStart = function () {
    document.getElementById("harper-start-screen").style.display = "none";
    messagesEl.style.display = "flex";
    document.getElementById("harper-input-row").style.display = "flex";
    addMessage("assistant", GREETING);
    speak(GREETING);
  };

  window.harperSend = async function (overrideText) {
    const text = (overrideText || inputEl.value).trim();
    if (!text) return;
    inputEl.value = "";
    addMessage("user", text);
    history.push({ role: "user", content: text });

    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, knownLead: leadInfo }),
      });
      const data = await res.json();
      addMessage("assistant", data.reply);
      history.push({ role: "assistant", content: data.reply });
      leadInfo = { ...leadInfo, ...data.extracted };
      speak(data.reply);
    } catch (e) {
      addMessage("assistant", "Sorry, having trouble connecting right now — please try again.");
    }
  };

  sendBtn.addEventListener("click", () => harperSend());
  inputEl.addEventListener("keydown", (e) => e.key === "Enter" && harperSend());
})();
</script>
